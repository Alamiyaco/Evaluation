<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>مركز المتابعة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="bg-layer" aria-hidden="true">
  <div class="bg-mesh"></div>
  <canvas id="particleCanvas"></canvas>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
</div>

<div id="toastZone"></div>

<div class="app-shell">
  <header class="topbar">
    <div class="topbar-main">
      <div class="brand-block">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div>
          <div class="brand-kicker">لوحة متابعة ذكية</div>
          <div class="brand-text">مركز المتابعة</div>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="sidebar-date compact-date">
          <div class="sdot"></div>
          <span id="sidebarDate">-</span>
        </div>

        <div class="update-chip">
          <span class="updated-lbl">آخر تحديث</span>
          <span id="lastUpdated" class="updated-val">-</span>
        </div>

        <button id="refreshBtn" class="refresh-btn" type="button">
          <svg id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/><path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
          </svg>
          تحديث البيانات
        </button>
      </div>
    </div>

    <nav class="tabs-wrap">
      <div class="sidebar-nav" id="sidebarNav"></div>
    </nav>
  </header>

  <main class="main-wrap">
    <section class="hero-card">
      <header class="page-header" id="pageHeader">
        <div class="ph-text">
          <div class="ph-badge" id="phBadge">جارٍ التحميل</div>
          <h1 id="pageTitle">---</h1>
          <p id="pageSubtitle" class="ph-sub"></p>
        </div>
        <div class="hero-side-note">
          <div class="hero-note-title">نظرة سريعة</div>
          <div class="hero-note-text">اعرض المناسبات والتقييمات بشكل أوضح وأسهل للقراءة والمتابعة اليومية.</div>
        </div>
      </header>

      <div class="toolbar">
        <div class="search-wrap">
          <input id="searchInput" type="text" placeholder="ابحث بالاسم أو القسم أو المناسبة..." autocomplete="off"/>
        </div>
        <div class="toolbar-filters">
          <div class="filter-wrap hidden" id="dynamicFilterBox">
            <select id="dynamicFilter"><option value="">الكل</option></select>
          </div>
          <div class="filter-wrap hidden" id="windowFilterBox">
            <select id="windowFilter">
              <option value="7">٧ أيام</option>
              <option value="14" selected>١٤ يوم</option>
              <option value="30">٣٠ يوم</option>
              <option value="9999">الكل</option>
            </select>
          </div>
        </div>
      </div>

      <div class="ph-stats" id="statsSection"></div>
    </section>

    <main id="pageContent"></main>
  </main>
</div>

<template id="evalTpl">
  <article class="kard">
    <div class="kard-top">
      <div class="kard-info">
        <h3 class="kard-name"></h3>
        <p class="kard-sub"></p>
      </div>
      <span class="kard-badge"></span>
    </div>
    <div class="kard-bottom">
      <div class="kard-date">
        <svg viewBox="0 0 20 20" fill="currentColor" width="13" height="13">
          <path d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zM4 8h12v8H4V8z"/>
        </svg>
        <span class="kard-date-txt"></span>
      </div>
      <div class="kard-days"></div>
    </div>
  </article>
</template>

<template id="eventTpl">
  <article class="kard">
    <div class="kard-top">
      <div class="kard-icon-wrap" data-emoji=""></div>
      <div class="kard-info">
        <h3 class="kard-name"></h3>
        <p class="kard-sub"></p>
      </div>
      <span class="kard-badge"></span>
    </div>
    <div class="kard-note-row" style="display:none">
      <p class="kard-note"></p>
    </div>
    <div class="kard-bottom">
      <div class="kard-date">
        <svg viewBox="0 0 20 20" fill="currentColor" width="13" height="13">
          <path d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zM4 8h12v8H4V8z"/>
        </svg>
        <span class="kard-date-txt"></span>
      </div>
      <div class="kard-days"></div>
    </div>
  </article>
</template>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
